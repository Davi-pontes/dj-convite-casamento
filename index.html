<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configurações Técnicas e Responsividade -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <!-- Título do Convite -->
    <title>Casamento Davi & Jhenifer - Convite Especial</title>
    
    <!-- Meta Tags para Otimização de Compartilhamento (Open Graph / WhatsApp / Facebook) -->
    <meta name="description" content="Temos a imensa alegria de convidar você para celebrar o nosso amor. Confirme sua presença e acesse as informações aqui!">
    <meta property="og:title" content="Casamento Davi & Jhenifer ♥">
    <meta property="og:description" content="Você é nosso convidado especial! Clique para visualizar o convite oficial, confirmar sua presença e ver a lista de presentes.">
    <meta property="og:image" content="/dj-convite-casamento/assets/casal-Y-mEG5tP.jpg"> <!-- Aparecerá como miniatura no WhatsApp -->
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    
    <!-- Favicon Elegante -->
    <link rel="icon" type="image/png" href="/dj-convite-casamento/assets/envelope-BPvHhgam.png">

    <!-- Estilos Globais e Locais -->
  <script type="module" crossorigin src="/dj-convite-casamento/assets/index-D7-nKb7K.js"></script>
  <link rel="stylesheet" crossorigin href="/dj-convite-casamento/assets/index-B6lKPgZF.css">
</head>
<body class="envelope-active">

    <!-- ==========================================
         PRELOADER (LOADING DE CARREGAMENTO)
         ========================================== -->
    <div id="preloader" role="status" aria-live="polite">
        <div class="loader-content">
            <div class="loader-monogram" id="preloader-logo">D ♥ J</div>
            <div class="loader-line" aria-hidden="true"></div>
            <div class="loader-text">Carregando Amor...</div>
        </div>
    </div>

    <!-- ==========================================
         SISTEMA DE ENVELOPE INTERATIVO
         ========================================== -->
    <div class="envelope-wrapper" id="envelope-section">
        <div class="envelope" id="interactive-envelope" aria-label="Envelope de Casamento. Clique para abrir o convite.">
            <!-- Aba Superior do Envelope -->
            <div class="envelope-flap"></div>
            
            <!-- Bolso Interno -->
            <div class="envelope-pocket">
                <!-- Texto no Bolso -->
                <div class="envelope-text">Para Você</div>
            </div>
            
            <!-- Lacre de Cera Ouro (Botão de Abertura) -->
            <button class="wax-seal" aria-label="Abrir convite"></button>
            
            <!-- Carta que Sobe com a Animação -->
            <div class="envelope-card">
                <div class="envelope-card-monogram">D & J</div>
                <div class="envelope-card-title" id="card-status-title">Você foi Convidado</div>
                <div class="envelope-card-subtitle" id="card-status-desc">Clique para abrir</div>
            </div>
        </div>
        <!-- Instrução Animada -->
        <div class="open-instruction" id="open-instruction-text" aria-hidden="true">Clique no envelope para abrir</div>
    </div>

    <!-- Scripts da Aplicação -->
</body>
</html>
